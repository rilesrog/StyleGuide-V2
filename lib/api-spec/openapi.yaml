openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: StyleSwipe API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: style
    description: Style quiz and profile operations
  - name: products
    description: Product feed and board operations
  - name: sessions
    description: Shared session operations
  - name: rooms
    description: Room assignment operations for Home Decoration mode
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /style-photos:
    get:
      operationId: getStylePhotos
      tags: [style]
      summary: Get style photos for the quiz
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of style photos not yet swiped by the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StylePhotosResponse"

  /swipes:
    post:
      operationId: recordSwipe
      tags: [style]
      summary: Record a swipe on a style photo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwipeRequest"
      responses:
        "201":
          description: Swipe recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwipeResponse"
    delete:
      operationId: resetSwipes
      tags: [style]
      summary: Reset all swipes for the current user (retake quiz)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All swipes deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetSwipesResponse"

  /style-profile:
    get:
      operationId: getStyleProfile
      tags: [style]
      summary: Get the user's computed style profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Style profile with weighted tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleProfileResponse"

  /style-board:
    get:
      operationId: getStyleBoard
      tags: [style]
      summary: Get the user's liked photos (style board)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liked photos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleBoardResponse"

  /products/feed:
    get:
      operationId: getProductFeed
      tags: [products]
      summary: Get ranked product feed based on user style profile
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: sessionId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Ranked products not yet swiped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductFeedResponse"

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Import products from an external source
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ImportProductItem"
      responses:
        "201":
          description: Products imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProductsResponse"

  /products/board:
    get:
      operationId: getProductBoard
      tags: [products]
      summary: Get the user's liked products (union with partner's when sessionId provided)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sessionId
          schema:
            type: integer
          required: false
          description: Active session ID; includes partner liked products in response
      responses:
        "200":
          description: Liked products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductBoardResponse"

  /product-swipes:
    post:
      operationId: recordProductSwipe
      tags: [products]
      summary: Record a swipe on a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductSwipeRequest"
      responses:
        "201":
          description: Product swipe recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSwipeResponse"

  /sessions:
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a shared style session and get an invite token
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"

  /sessions/join/{token}:
    get:
      operationId: joinSession
      tags: [sessions]
      summary: Join a session by invite token
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session joined (or re-polled by creator)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Session is full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session status and members (poll to detect partner joining)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "403":
          description: Not a session member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/matches:
    get:
      operationId: getSessionMatches
      tags: [sessions]
      summary: Get products both session members have liked (the venn diagram overlap)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Matched products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionMatchesResponse"

  /sessions/{id}/mode:
    patch:
      operationId: updateSessionMode
      tags: [sessions]
      summary: Set the session mode (decoration or registry)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModeUpdateRequest"
      responses:
        "200":
          description: Mode updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModeUpdateResponse"

  /sessions/{id}/registry:
    get:
      operationId: getSessionRegistry
      tags: [sessions]
      summary: Get registry items (mutual likes) and pending items (one-sided likes)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registry products with pending list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRegistryResponse"

  /sessions/{id}/registry/export:
    get:
      operationId: exportSessionRegistry
      tags: [sessions]
      summary: Export registry as a plain-text list
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plain text registry export
          content:
            text/plain:
              schema:
                type: string

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user info including active mode
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMeResponse"

  /users/me/mode:
    patch:
      operationId: updateUserMode
      tags: [auth]
      summary: Update current user's active mode
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModeUpdateRequest"
      responses:
        "200":
          description: Mode updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModeUpdateResponse"

  /rooms:
    get:
      operationId: getRooms
      tags: [rooms]
      summary: Get all room assignments for the current user (or merged with partner if sessionId provided)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sessionId
          schema:
            type: integer
          required: false
          description: Active session ID; when provided, merges partner room assignments
      responses:
        "200":
          description: Room assignments grouped by room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomsResponse"

  /rooms/assign:
    post:
      operationId: assignProductToRoom
      tags: [rooms]
      summary: Assign a liked product to a room
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomAssignRequest"
      responses:
        "201":
          description: Product assigned to room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomAssignResponse"
    delete:
      operationId: removeProductFromRoom
      tags: [rooms]
      summary: Remove a product from a room
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomAssignRequest"
      responses:
        "200":
          description: Product removed from room
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        token:
          type: string
      required:
        - userId
        - name
        - email
        - token

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    StylePhoto:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string
      required:
        - id
        - url
        - tags

    StylePhotosResponse:
      type: object
      properties:
        photos:
          type: array
          items:
            $ref: "#/components/schemas/StylePhoto"
        total:
          type: integer
      required:
        - photos
        - total

    SwipeRequest:
      type: object
      properties:
        photoId:
          type: integer
        liked:
          type: boolean
      required:
        - photoId
        - liked

    SwipeResponse:
      type: object
      properties:
        success:
          type: boolean
        swipeId:
          type: integer
      required:
        - success
        - swipeId

    ResetSwipesResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    StyleTagWeight:
      type: object
      properties:
        tag:
          type: string
        score:
          type: number
        count:
          type: integer
      required:
        - tag
        - score
        - count

    StyleProfileResponse:
      type: object
      properties:
        topTags:
          type: array
          items:
            type: string
        tagWeights:
          type: array
          items:
            $ref: "#/components/schemas/StyleTagWeight"
        totalSwipes:
          type: integer
        likedCount:
          type: integer
      required:
        - topTags
        - tagWeights
        - totalSwipes
        - likedCount

    StyleBoardResponse:
      type: object
      properties:
        photos:
          type: array
          items:
            $ref: "#/components/schemas/StylePhoto"
      required:
        - photos

    Product:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        name:
          type: string
        price:
          type: number
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        brand:
          type: string
        source:
          type: string
        affiliateUrl:
          type: string
      required:
        - id
        - url
        - name
        - price
        - tags
        - category

    ProductFeedResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
      required:
        - products
        - total

    ProductSwipeRequest:
      type: object
      properties:
        productId:
          type: integer
        liked:
          type: boolean
        sessionId:
          type: integer
      required:
        - productId
        - liked

    ProductSwipeResponse:
      type: object
      properties:
        success:
          type: boolean
        swipeId:
          type: integer
      required:
        - success
        - swipeId

    ProductBoardResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - products

    ImportProductsRequest:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ImportProductItem"
      required:
        - products

    ImportProductItem:
      type: object
      properties:
        photo_url:
          type: string
        name:
          type: string
        price:
          type: number
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        brand:
          type: string
        affiliateUrl:
          type: string
      required:
        - photo_url
        - name
        - price
        - tags

    ImportProductsResponse:
      type: object
      properties:
        imported:
          type: integer
        ids:
          type: array
          items:
            type: integer
      required:
        - imported
        - ids

    SessionMember:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
      required:
        - id
        - name
        - email

    SessionResponse:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        mode:
          type: string
        inviteToken:
          type: string
        inviteUrl:
          type: string
        creator:
          $ref: "#/components/schemas/SessionMember"
        partner:
          $ref: "#/components/schemas/SessionMember"
      required:
        - id
        - status
        - inviteToken
        - inviteUrl
        - creator

    SessionMatchesResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        count:
          type: integer
      required:
        - products
        - count

    SessionRegistryResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        count:
          type: integer
        pending:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - products
        - count
        - pending

    ModeUpdateRequest:
      type: object
      properties:
        mode:
          type: string
      required:
        - mode

    ModeUpdateResponse:
      type: object
      properties:
        success:
          type: boolean
        mode:
          type: string
      required:
        - success
        - mode

    UserMeResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        mode:
          type: string
      required:
        - id
        - name
        - email

    RoomProductItem:
      type: object
      properties:
        id:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        owner:
          type: string
          enum: [me, partner]
          description: "me = current user assigned this; partner = the other session member assigned this"
      required:
        - id
        - product
        - owner

    RoomGroup:
      type: object
      properties:
        name:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoomProductItem"
      required:
        - name
        - items

    RoomsResponse:
      type: object
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/RoomGroup"
        presetRooms:
          type: array
          items:
            type: string
      required:
        - rooms
        - presetRooms

    RoomAssignRequest:
      type: object
      properties:
        productId:
          type: integer
        room:
          type: string
      required:
        - productId
        - room

    RoomAssignResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer
      required:
        - success
        - id
