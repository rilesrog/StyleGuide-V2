openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: StyleSwipe API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: style
    description: Style quiz and profile operations
  - name: products
    description: Product feed and board operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /style-photos:
    get:
      operationId: getStylePhotos
      tags: [style]
      summary: Get style photos for the quiz
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of style photos not yet swiped by the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StylePhotosResponse"

  /swipes:
    post:
      operationId: recordSwipe
      tags: [style]
      summary: Record a swipe on a style photo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwipeRequest"
      responses:
        "201":
          description: Swipe recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwipeResponse"
    delete:
      operationId: resetSwipes
      tags: [style]
      summary: Reset all swipes for the current user (retake quiz)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All swipes deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetSwipesResponse"

  /style-profile:
    get:
      operationId: getStyleProfile
      tags: [style]
      summary: Get the user's computed style profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Style profile with weighted tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleProfileResponse"

  /style-board:
    get:
      operationId: getStyleBoard
      tags: [style]
      summary: Get the user's liked photos (style board)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liked photos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleBoardResponse"

  /products/feed:
    get:
      operationId: getProductFeed
      tags: [products]
      summary: Get ranked product feed based on user style profile
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Ranked products not yet swiped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductFeedResponse"

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Import products from an external source
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProductsRequest"
      responses:
        "201":
          description: Products imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProductsResponse"

  /products/board:
    get:
      operationId: getProductBoard
      tags: [products]
      summary: Get the user's liked products
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liked products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductBoardResponse"

  /product-swipes:
    post:
      operationId: recordProductSwipe
      tags: [products]
      summary: Record a swipe on a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductSwipeRequest"
      responses:
        "201":
          description: Product swipe recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSwipeResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        token:
          type: string
      required:
        - userId
        - name
        - email
        - token

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    StylePhoto:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string
      required:
        - id
        - url
        - tags

    StylePhotosResponse:
      type: object
      properties:
        photos:
          type: array
          items:
            $ref: "#/components/schemas/StylePhoto"
        total:
          type: integer
      required:
        - photos
        - total

    SwipeRequest:
      type: object
      properties:
        photoId:
          type: integer
        liked:
          type: boolean
      required:
        - photoId
        - liked

    SwipeResponse:
      type: object
      properties:
        success:
          type: boolean
        swipeId:
          type: integer
      required:
        - success
        - swipeId

    ResetSwipesResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    StyleTagWeight:
      type: object
      properties:
        tag:
          type: string
        score:
          type: number
        count:
          type: integer
      required:
        - tag
        - score
        - count

    StyleProfileResponse:
      type: object
      properties:
        topTags:
          type: array
          items:
            type: string
        tagWeights:
          type: array
          items:
            $ref: "#/components/schemas/StyleTagWeight"
        totalSwipes:
          type: integer
        likedCount:
          type: integer
      required:
        - topTags
        - tagWeights
        - totalSwipes
        - likedCount

    StyleBoardResponse:
      type: object
      properties:
        photos:
          type: array
          items:
            $ref: "#/components/schemas/StylePhoto"
      required:
        - photos

    Product:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        name:
          type: string
        price:
          type: number
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        brand:
          type: string
        source:
          type: string
        affiliateUrl:
          type: string
      required:
        - id
        - url
        - name
        - price
        - tags
        - category

    ProductFeedResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
      required:
        - products
        - total

    ProductSwipeRequest:
      type: object
      properties:
        productId:
          type: integer
        liked:
          type: boolean
      required:
        - productId
        - liked

    ProductSwipeResponse:
      type: object
      properties:
        success:
          type: boolean
        swipeId:
          type: integer
      required:
        - success
        - swipeId

    ProductBoardResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - products

    ImportProductsRequest:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ImportProductItem"
      required:
        - products

    ImportProductItem:
      type: object
      properties:
        photo_url:
          type: string
        name:
          type: string
        price:
          type: number
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        brand:
          type: string
        affiliateUrl:
          type: string
      required:
        - photo_url
        - name
        - price
        - tags

    ImportProductsResponse:
      type: object
      properties:
        imported:
          type: integer
        ids:
          type: array
          items:
            type: integer
      required:
        - imported
        - ids
